spring:
  application:
    name: ai-counselor-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

app:
  jwt:
    expiration-ms: 86400000
  agent:
    timeout-seconds: 300

logging:
  level:
    com.hfut.counselor: INFO
